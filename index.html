<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vocacional Tech Pilar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        .page-bg {
            background-image: url(./assets/FLYERVR.jpeg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body { 
            font-family: 'Plus+Jakarta+Sans', sans-serif; 
        }
        
        #app {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }

        .option-btn { transition: all 0.2s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .option-btn:hover { border-color: #0669b1; background-color: rgba(39, 133, 255, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #chart-container { width: 100%; height: 220px; margin: 0 auto; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-900 page-bg">

   <div id="app" class="max-w-xl w-full rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100/50">
        
        <div class="px-8 pt-8 pb-1">
            <div class="flex justify-between items-end mb-4">
                <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Test Vocacional Pilar</h1>
           </div>
            <div class="h-1.5 w-full bg-gray-100/50 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="px-10 pb-10">
            <div id="start-view" class="fade-in text-center">
                <div class="inline-block p-4 pb-2 bg-indigo rounded-3xl text-4xl"><img src="./assets/LOGOMUNI.png" width="150" alt=""></div>
                <h2 class="text-2xl font-bold text-gray-900 mb-3">Tu Futuro en Pilar</h2>
                <p class="text-gray-500 text-sm mb-8 leading-relaxed">Descubrí tu perfil tecnológico ideal en pocos pasos.</p>
                <button onclick="startTest()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg">Comenzar</button>
            </div>

            <div id="question-view" class="hidden fade-in">
                <h2 id="question-text" class="text-lg font-bold text-gray-800 mb-6 leading-tight min-h-[.5rem] pt-[1rem]"></h2>
                <div id="options-container" class="space-y-3"></div>
            </div>

            <div id="result-view" class="hidden fade-in">
                <div class="text-center mb-4">
                    <h2 class="text-2xl font-black text-gray-900 mb-1 pt-2">Tu Perfil</h2>
                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em]">Aptitudes Detectadas</p>
                </div>
                
                <div class="bg-gray-50/90 rounded-[2rem] p-6 mb-6 border border-gray-100/50">
                    <div id="chart-container"><canvas id="barChart"></canvas></div>
                </div>

                <div class="space-y-4 mb-6">
                    <div class="bg-blue-600 rounded-3xl p-6 text-white shadow-xl">
                        <p class="text-[10px] font-bold uppercase mb-1 opacity-70 tracking-widest">Análisis</p>
                        <p id="career-1" class="text-xl font-bold mb-1"></p>
                        <p id="desc-1" class="text-xs leading-snug opacity-95 border-l-2 border-white/30 pl-3 mb-4"></p>
                        <div class="pt-3 border-t border-white/10">
                            <p class="text-[10px] font-bold uppercase mb-1">Sede:</p>
                            <p id="uni-1" class="text-xs font-bold"></p>
                        </div>
                    </div>

                    <div class="bg-blue-50/90 rounded-3xl p-5 border border-blue-100">
                        <p class="text-[10px] font-bold text-blue-400 uppercase mb-3 tracking-widest">Otras opciones</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p id="career-2" class="text-sm font-bold text-blue-900"></p>
                                <p id="uni-2" class="text-[10px] text-blue-600"></p>
                            </div>
                            <div>
                                <p id="career-3" class="text-sm font-bold text-indigo-900"></p>
                                <p id="uni-3" class="text-[10px] text-blue-600"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="generatePDF()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all">Descargar PDF</button>
                    <button onclick="showQR()" class="w-full bg-white border-2 border-gray-100 text-gray-700 font-bold py-4 rounded-2xl">Compartir QR</button>
                    <button onclick="location.reload()" class="w-full text-gray-400 font-bold text-[10px] uppercase tracking-widest mt-2">Reiniciar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center">
            <h3 class="text-lg font-bold mb-6">¡Compartilo!</h3>
            <div id="qrcode" class="mb-8 flex justify-center"></div>
            <button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="w-full bg-blue-800 text-white font-bold py-4 rounded-2xl">Cerrar</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: " ¿Qué te resulta más interesante?", opts: ["Resolver problemas complejos", "Entender la naturaleza", "Crear videos o fotos", "Comunicar ideas", "Organizar procesos", "Enterder la creacion de paginas web"], vals: ["DS", "BIO", "AV", "CD", "PT", "PW"] },
            { q: "Un colega dice que tu mayor virtud es que...", opts: ["Encontrás soluciones practicas", "Convertís ideas en algo visual", "Ves riesgos antes que nadie", "Buscas soluciones en base a tu curiosidad", "Mantenés al equipo enfocado", "Entendés de elemtentos tecnologicos"], vals: ["DS", "AV", "PW", "CD", "PT", "RC"] },
            { q: "Si la tecnología fuera un deporte, sería...", opts: ["Ajedrez: estrategia pura, lógica y anticipación a varios movimientos", "Atletismo artístico: rendimiento técnico con expresión y estética", "Artes marciales: disciplina, defensa y contraataque preciso", "Fórmula 1: velocidad, infraestructura perfecta y mínimo margen de error", "Rugby: liderazgo, trabajo colectivo y pensamiento táctico de equipo", "Motocross: mecánica, adrenalina y dominio total del equipo físico"], vals: ["DS", "AV", "PW", "CD", "PT", "RC"] },
            { q: "¿Cómo preferís trabajar?", opts: ["Solo y concentrado", "En laboratorio", "En equipo creativo", "Comunicación constante", "Coordinando tareas", "Instalando equipos"], vals: ["DS", "BIO", "AV", "CD", "PT", "RC"] },
            { q: "¿Qué tipo de contenido consumís más?", opts: ["Programación", "Ciencia/Documentales", "Videos/Streaming", "Redes sociales", "Contenido organizativo", "Tutoriales técnicos"], vals: ["DS", "BIO", "AV", "CD", "PT", "RC"] },
            { q: "¿Qué te describiría mejor?", opts: ["Analítico", "Curioso", "Creativo", "Sociable", "Organizado", "Práctico"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] },
            { q: "¿Qué te gustaría aprender?", opts: ["Crear apps", "Biología", "Producción audiovisual", "Marketing digital", "Gestión de procesos", "Herramientas de oficina"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] },
            { q: "¿Qué te motiva más?", opts: ["Encontrar soluciones", "Descubrir cosas", "Expresarte", "Comunicar", "Lograr objetivos", "Soporte técnico"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] },
            { q: "¿Qué ambiente preferís?", opts: ["Silencioso", "Laboratorio", "Set creativo", "Dinámico", "Industrial", "Oficina"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] },
            { q: "¿Qué te resulta más fácil?", opts: ["Pensar soluciones", "Analizar información", "Crear contenido", "Hablar/Expresarte", "Planificar", "Optimizar software"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] },
            { q: "¿Qué te gustaría lograr?", opts: ["Desarrollar tecnología", "Aportar a la ciencia", "Crear audiovisual", "Comunicar", "Optimizar procesos", "Soporte informático"], vals: ["DS", "BIO", "AV", "CD", "PT", "OI"] }
        ];

        let currentIdx = 0;
        let scores = { DS: 0, BIO: 0, AV: 0, CD: 0, PT: 0, PW: 0, OI: 0, RC: 0 };
        let topThree = [];

        const profileMap = {
            DS: { career: "Desarrollo de Software", unis: ["Universidad Nacional de Pilar (unpilar)"] },
            BIO: { career: "Biotecnología", unis: ["Universidad Nacional de Pilar (unpilar)"] },
            AV: { career: "Realización Audiovisual", unis: ["Universidad Nacional de Pilar (unpilar)"] },
            CD: { career: "Comunicación Digital", unis: ["Universidad Nacional de Pilar (unpilar)"] },
            PT: { career: "Producción y Tecnología", unis: ["Universidad Nacional de Pilar (unpilar)"] },
            PW: { career: "Programación Web", unis: ["Curso Municipal Pilar"] },
            OI: { career: "Operador de Informática", unis: ["Curso Municipal Pilar"] },
            RC: { career: "Reparación de Celulares", unis: ["Curso Municipal Pilar"] }
        };

        function startTest() {
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('question-view').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('step-counter').innerText = `Paso ${currentIdx + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-2xl text-xs font-semibold bg-white border border-gray-100/50";
                btn.innerText = opt;
                btn.onclick = () => { 
                    scores[q.vals[i]]++; 
                    currentIdx++; 
                    if (currentIdx < questions.length) showQuestion(); 
                    else showResults(); 
                };
                container.appendChild(btn);
            });
        }

        function generateDynamicDescription(scores) {
            const maxScore = Math.max(...Object.values(scores));
            const topTraits = Object.keys(scores).filter(key => scores[key] === maxScore);
            const traits = {
                DS: "lógica aguda y resolución de problemas.",
                BIO: "curiosidad científica y análisis biotecnológico.",
                AV: "creatividad visual y talento narrativo.",
                CD: "estrategia comunicativa y medios digitales.",
                PT: "eficiencia y gestión de procesos.",
                PW: "perfil de constructor web moderno.",
                OI: "organización metódica y soporte IT.",
                RC: "destreza técnica y hardware."
            };
            return "Tenés un perfil con " + (traits[topTraits[0]] || "habilidades técnicas.") + " Ideal para entornos que exigen soluciones reales.";
        }

        function showResults() {
            document.getElementById('question-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            topThree = Object.entries(scores).sort((a,b) => b[1] - a[1]).slice(0, 3).map(item => profileMap[item[0]]);
            document.getElementById('career-1').innerText = topThree[0].career;
            document.getElementById('desc-1').innerText = generateDynamicDescription(scores);
            document.getElementById('uni-1').innerText = topThree[0].unis[0];
            document.getElementById('career-2').innerText = "2° " + topThree[1].career;
            document.getElementById('uni-2').innerText = topThree[1].unis[0];
            document.getElementById('career-3').innerText = "3° " + topThree[2].career;
            document.getElementById('uni-3').innerText = topThree[2].unis[0];
            
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: ['Lógica', 'Ciencia', 'Creativ.', 'Estrat.', 'Gestión'],
                    datasets: [{ data: [scores.DS + scores.PW, scores.BIO, scores.AV, scores.CD, scores.PT + scores.OI + scores.RC], backgroundColor: ['#1e40af', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'], borderRadius: 6 }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false } }, maintainAspectRatio: false }
            });
        }

        function showQR() {
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            new QRCode(container, { text: window.location.href, width: 160, height: 160, colorDark : "#1e40af" });
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(30, 64, 175);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("Reporte Vocacional Pilar", 20, 25);
            
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(14);
            doc.text("Tus 3 Mejores Coincidencias:", 20, 55);
            
            doc.setTextColor(30, 64, 175);
            doc.setFontSize(16);
            doc.text("1. " + topThree[0].career, 20, 65);
            doc.setFontSize(10);
            doc.setTextColor(80, 80, 80);
            doc.text(doc.splitTextToSize(topThree[0].personality, 170), 20, 72);
            doc.text("Sede: " + topThree[0].unis[0], 20, 82);

            doc.setTextColor(40, 40, 40);
            doc.text("- 2. " + topThree[1].career + " (" + topThree[1].unis[0] + ")", 20, 95);
            doc.text("- 3. " + topThree[2].career + " (" + topThree[2].unis[0] + ")", 20, 102);

            const canvas = document.getElementById('barChart');
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 115, 180, 70);
            doc.save("Reporte_Test_Pilar.pdf");
        }
    </script>
</body>
</html>
